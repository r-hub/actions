name: 'r-hub/actions/setup-r-netbsd'
description: |
  Setup a NetBSD VM with R. Run this action on `ubuntu-latest`.
  Based on https://github.com/vmactions/netbsd-vm.
author: 'Gábor Csárdi'

inputs:
  release:
    description: 'The release version of NetBSD VM.'
    required: false
    default: '10.1'

runs:
  using: "composite"
  steps:

  - name: Start NetBSD VM. This might take 2-3 minutes.
    uses: vmactions/netbsd-vm@v1
    with:
      release: ${{ inputs.release || '10.1' }}
      envs: 'RUNNER_TEMP R_LIBS_USER NOT_CRAN'
      run: |
        uname -a

  - name: Set up R library for caching, NOT_CRAN
    run: |
      R_LIBS_USER=${RUNNER_TEMP}/Library
      echo "R_LIBS_USER=${R_LIBS_USER}" >> ${GITHUB_ENV}
      if [[ -z "$NOT_CRAN" ]]; then echo "NOT_CRAN=true" >> ${GITHUB_ENV}; fi
      mkdir -p "${R_LIBS_USER}"
    shell: bash

  - run: |
      # Install R and pak
      echo "::group::Install R"
      # Missing locales (?) cause crashes otherwise
      unset LANG
      # Install X11 libs (set URL must match the VM's NetBSD release)
      curl -s -L https://ftp.netbsd.org/pub/NetBSD/NetBSD-${{ inputs.release || '10.1' }}/amd64/binary/sets/xbase.tar.xz | tar xzf - -C /
      # Install some system packages, so we can install tidyverse, devtools
      /usr/sbin/pkg_add -u R curl gmake libxml2 libgit2 qpdf
      echo "::endgroup::"
      echo "::group::Diagnose internet module"
      # "internet routines cannot be loaded" means R cannot dlopen its
      # internet module. ldd names the missing/incompatible library, and
      # capabilities() shows whether R was built with libcurl at all.
      RHOME=$(R RHOME); echo "RHOME=$RHOME"
      ls -l "$RHOME/modules/"
      ldd "$RHOME/modules/internet.so" || true
      ldd /usr/pkg/lib/libcurl.so.4 || true
      ls -l /usr/pkg/lib/libcurl* 2>/dev/null || true
      pkg_info -e curl; pkg_info curl 2>/dev/null | head
      R -q -e 'print(capabilities()[c("libcurl","http/ftp")]); print(extSoftVersion())'
      # R swallows the dlopen error and only prints "internet routines
      # cannot be loaded". dyn.load() surfaces the real OS-level reason
      # (missing library vs. unresolved symbol).
      R -q -e 'tryCatch(dyn.load(file.path(R.home("modules"), paste0("internet", .Platform$dynlib.ext))), error = print)'
      echo "::endgroup::"
      echo "::group::Configure R"
      ncpu=`(grep -c ^processor /proc/cpuinfo) || echo 4`
      echo "options(Ncpus=${ncpu})" >> ~/.Rprofile
      R -q -e 'dir.create(Sys.getenv("R_LIBS_SITE"), showWarnings = FALSE, recursive = TRUE)'
      R -q -e 'dir.create(Sys.getenv("R_LIBS_USER"), showWarnings = FALSE, recursive = TRUE)'
      echo 'export LC_COLLATE=C' >> /etc/profile
      echo 'export LC_CTYPE=C' >> /etc/profile
      echo 'export LANG=en_US.UTF-8' >> /etc/profile
      echo 'export MAKE=gmake' >> /etc/profile
      curl -LO https://raw.githubusercontent.com/r-hub/containers/refs/heads/main/dependencies/checkbashisms/checkbashisms
      mkdir -p /usr/local/bin
      mv checkbashisms /usr/local/bin/
      sed -i.bak 's|/usr/bin/perl|/usr/bin/env perl|' /usr/local/bin/checkbashisms
      rm /usr/local/bin/checkbashisms.bak
      chmod +x /usr/local/bin/checkbashisms
      echo "::endgroup::"
      echo "::group::Install pak"
      R -q -e 'install.packages("pak", lib = Sys.getenv("R_LIBS_SITE"), repos = sprintf(
                 "https://r-lib.github.io/p/pak/devel/%s/%s/%s",
                 .Platform$pkgType,
                 R.Version()$os,
                 R.Version()$arch
               ))'
      # if that fails, try to install the released version from source
      R -q -e 'library(pak)' ||
        R -q -e 'install.packages("pak", lib = Sys.getenv("R_LIBS_SITE"), repos = "https://cloud.r-project.org")'
      R -e 'library(pak)'
      echo "::endgroup::"
    shell: netbsd {0}

  - name: Set up remote shell
    run: |
      cp ${{ github.action_path }}/Rscript \
        /usr/local/bin/Rscript
      chmod 775 /usr/local/bin/Rscript
    shell: bash

  - name: Test R in NetBSD VM
    run: |
      getRversion()
      R.version[["platform"]]
      .libPaths()
      .Library
      Sys.getenv("R_LIBS_SITE")
      Sys.getenv("R_LIBS_USER")
      find.package("pak")
    shell: Rscript {0}
